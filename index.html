<html>
    <head>
        <title>Footprint Game</title>
        <link rel="stylesheet" href="styles/base.css" />
        <script src="scripts/base.js" type="module"></script>
    </head>
    <body>
    <div class="pnlMenu">
         <!-- <label for="drpRounds">Rounds: </label> -->
         <select id="drpTimer">
            <option value="5">5s</option>
            <option value="10">10s</option>
            <option value="-1">Inf.</option>
         </select>
         <select id="drpRounds">
             <option value="1">1 round</option>
             <option value="3">3 rounds</option>
             <option value="5">5 rounds</option>
             <option value="10">10 rounds</option>
             <option value="15">15 rounds</option>
             <option value="20">20 rounds</option>
         </select>
         <progress id="pgTimer"></progress>
     </div>
    <div id="pnlFootPrint" class="pnlFootPrint">
        <label id="lblFootPrint" for="imgFootPrint">Footprint game!</label>
        <img id="imgFootPrint" alt="Footprint"/>
    </div>
    <div id="pnlChoices" class="pnlChoices">
        <button id="btnG1">
            <img id="imgG1"/>
            <label for="imgG1">Click to Start</label>
        </button>
        <button id="btnG2">
            <img id="imgG2"/>
            <label for="imgG2">Click to Start</label>
        </button>
        <button id="btnG3">
            <img id="imgG3"/>
            <label for="imgG3">Click to Start</label>
        </button>
        <button id="btnG4">
            <img id="imgG4"/>
            <label for="imgG4">Click to Start</label>
        </button>
    </div>
</html>
